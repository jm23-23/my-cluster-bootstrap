apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
spec:
  project: default
  source:
    chart: metrics-server
    repoURL: https://kubernetes-sigs.github.io/metrics-server/
    targetRevision: 3.12.1  # Matches your current version
    helm:
      values: |
        args:
          - --kubelet-insecure-tls  # Ensures it works smoothly on local/test clusters
  destination:
    server: https://kubernetes.cloud.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true