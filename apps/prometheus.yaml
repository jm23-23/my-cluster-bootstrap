apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    chart: prometheus
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 29.9.0 # Pinning a stable 2026 version
    helm:
      values: |
        alertmanager:
          persistentVolume:
            size: 2Gi
        server:
          persistentVolume:
            size: 10Gi
          retention: 7d
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # Tells Argo CD to create the 'monitoring' namespace automatically