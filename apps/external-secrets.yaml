apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0" # Install operator + CRDs first
spec:
  project: default
  source:
    chart: external-secrets
    repoURL: https://charts.external-secrets.io
    targetRevision: 0.14.4 # Pinning a stable 2026 version
    helm:
      values: |
        installCRDs: true
        # The default registry (oci.external-secrets.io) can fail to pull
        # ("unexpected EOF"). Use the canonical GHCR images instead.
        image:
          repository: ghcr.io/external-secrets/external-secrets
        webhook:
          image:
            repository: ghcr.io/external-secrets/external-secrets
        certController:
          image:
            repository: ghcr.io/external-secrets/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true   # Create the 'external-secrets' namespace automatically
      - ServerSideApply=true   # CRDs are large; avoids client-side apply annotation limits
