apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-bootstrap
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/jm23-23/my-cluster-bootstrap.git' # CHANGE THIS
    targetRevision: HEAD
    path: apps
  destination:
    server: 'https://kubernetes.cloud.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true