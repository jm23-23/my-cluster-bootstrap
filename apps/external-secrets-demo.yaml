apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-demo
  namespace: argocd
  annotations:
    # Sync after the operator (wave 0) so the CRDs exist before these CRs apply
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: 'https://github.com/jm23-23/my-cluster-bootstrap.git' # CHANGE THIS
    targetRevision: HEAD
    path: external-secrets-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # Retry while the CRDs finish registering on a fresh cluster
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
