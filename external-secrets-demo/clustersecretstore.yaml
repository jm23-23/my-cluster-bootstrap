apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: fake
spec:
  provider:
    # The Fake provider serves the values defined inline below.
    # No external backend required — ideal for local test clusters.
    fake:
      data:
        - key: "/demo/db-credentials"
          value: '{"username":"test-user","password":"test-pass"}'
          version: "v1"
        - key: "/demo/api-token"
          value: "local-test-token-123"
          version: "v1"
