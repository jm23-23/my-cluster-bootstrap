apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: fake
spec:
  provider:
    # The Fake provider serves the values defined inline below.
    # No external backend required — ideal for local test clusters.
    fake:
      # NOTE: the Fake provider matches on key AND version. Since the
      # ExternalSecret remoteRefs don't request a specific version, leave
      # version unset here so lookups (empty version) match.
      data:
        - key: "/demo/db-credentials"
          value: '{"username":"test-user","password":"test-pass"}'
        - key: "/demo/api-token"
          value: "local-test-token-123"
